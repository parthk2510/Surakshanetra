limit_req_zone $binary_remote_addr zone=login_zone:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=register_zone:10m rate=3r/m;
limit_req_zone $binary_remote_addr zone=api_zone:20m rate=120r/s;
limit_req_zone $binary_remote_addr zone=general_zone:20m rate=200r/s;
limit_conn_zone $binary_remote_addr zone=conn_zone:10m;

proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:20m max_size=500m inactive=10m use_temp_path=off;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location = /api/health {
        proxy_pass         http://backend_pool/api/health;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        access_log off;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
