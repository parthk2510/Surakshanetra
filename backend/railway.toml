# Railway config — used when "Root Directory" is set to "backend/" in the Railway UI.
# The repo-root railway.toml is used when Root Directory is left as the repo root.

[build]
builder        = "DOCKERFILE"
dockerfilePath = "dockerfile.railway"

[deploy]
healthcheckPath         = "/api/health"
healthcheckTimeout      = 300
restartPolicyType       = "ON_FAILURE"
restartPolicyMaxRetries = 10
